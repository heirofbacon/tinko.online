        body { font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        .nav-link {

            font-weight: 600; cursor: pointer; white-space: nowrap;

        .nav-link:hover { background-color: #27272a; color: #34d399; }
        .nav-link.active { background-color: #18181b; color: #10b981; border-left: 4px solid #10b981; }

        /* Modular Command Boxes */

            background: #121214; border: 1px solid #27272a; border-radius: 1rem; 
            padding: 1.5rem; transition: border-color 0.2s, transform 0.2s; 
        }
        .cmd-box:hover { border-color: #3f3f46; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .cmd-code { font-family: monospace; font-size: 1.15rem; font-weight: 800; color: #10b981; margin-bottom: 0.75rem; display: block; }
        .cmd-mod-code { color: #ef4444; }

        /* Social Animations */
        .social-icon { transition: all 0.3s ease; opacity: 0.5; display: inline-block; }
        .social-icon:hover { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.5)); }

        @keyframes tada {
            0% { transform: scale3d(1, 1, 1); }
            10%, 20% { transform: scale3d(0.9, 0.9, 0.9) rotate3d(0, 0, 1, -3deg); }
            30%, 50%, 70%, 90% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, 3deg); }
            40%, 60%, 80% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, -3deg); }
            100% { transform: scale3d(1, 1, 1); }
        }
        .animate-tada { animation: tada 1s cubic-bezier(0.25, 1, 0.5, 1); }
        
    </style>

    <script>
        let currentModule = '';

        function initTadaAnimations() {
            setInterval(() => {
                document.querySelectorAll('.support-btn-anim').forEach(btn => {
                    btn.classList.remove('animate-tada');
                    void btn.offsetWidth;
                    btn.classList.add('animate-tada');
                });
            }, 8000);
        }

        function loadModule(target) {
            if (currentModule === target) return; 
            currentModule = target;

            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            const activeLink = document.querySelector(`.nav-link[data-target="${target}"]`);
            if (activeLink) activeLink.classList.add('active');

            const container = document.getElementById('module-container');
            const scrollArea = document.getElementById('main-scroll-area');
            if (scrollArea) scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
            
            container.innerHTML = `
                <div class="flex justify-center items-center h-[50vh] w-full">
                    <i class="fas fa-circle-notch fa-spin text-5xl text-emerald-500 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]"></i>
                </div>
            `;

            fetch(`./tools/${target}.html`)
                .then(response => {
                    if (!response.ok) throw new Error(`Module ${target}.html not found.`);
                    return response.text();
                })
                .then(html => {
                    container.innerHTML = html;
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        if (oldScript.innerHTML) newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                })
                .catch(error => {
                    console.error('[Router]', error);
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-[50vh] text-center px-4">
                            <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-6 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]"></i>
                            <h2 class="text-3xl font-bold text-white mb-2">Module Not Found</h2>
                            <p class="text-zinc-500 max-w-md">Failed to load <code>./tools/${target}.html</code>. Make sure the file exists.</p>
                        </div>
                    `;
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTadaAnimations();
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadModule(e.currentTarget.getAttribute('data-target'));
                });
            });
            loadModule('home'); // Load default on boot
        });

        window.switchTab = function(target) { loadModule(target); };
    </script>
