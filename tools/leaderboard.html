<div class="w-full p-4 md:p-8 pb-12 animate-[fadeIn_0.3s_ease-out]">
    <div class="max-w-4xl mx-auto text-center py-16 md:py-20">
        
        <!-- Trophy Icon -->
        <div class="w-32 h-32 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-amber-500/20 shadow-[0_0_30px_rgba(245,158,11,0.2)]">
            <i class="fas fa-trophy text-6xl text-amber-500"></i>
        </div>
        
        <h2 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">Streamer <span class="text-amber-500">Leaderboards</span></h2>
        <p class="text-lg md:text-xl text-zinc-400 mb-10 max-w-xl mx-auto leading-relaxed">Search for a streamer to view their live community leaderboard, player stats, and active events.</p>
        
        <!-- Search Box -->
        <div class="max-w-xl mx-auto bg-zinc-900 border border-zinc-700 p-2 rounded-2xl flex items-center shadow-2xl focus-within:border-emerald-500/50 focus-within:ring-4 focus-within:ring-emerald-500/10 transition-all">
            <div class="pl-5 pr-3 text-zinc-500">
                <i class="fas fa-search text-lg"></i>
            </div>
            <input 
                type="text" 
                id="streamer-search-input" 
                placeholder="Enter streamer username..." 
                class="bg-transparent border-none outline-none text-white w-full py-4 text-lg placeholder-zinc-600 font-bold tracking-wide" 
                onkeypress="if(event.key === 'Enter') window.openStreamerProfile()"
                autocomplete="off"
            >
            <button 
                onclick="window.openStreamerProfile()" 
                class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-8 py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] whitespace-nowrap flex items-center gap-2"
            >
                Search <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- Helper Text -->
        <div class="mt-6 text-sm text-zinc-500 font-bold uppercase tracking-widest">
            Powered by Tinko Backend API
        </div>

        <div class="mt-16">
            <button onclick="window.switchTab('home')" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold px-8 py-4 rounded-xl transition-all border border-zinc-700 shadow-lg">
                <i class="fas fa-arrow-left mr-2"></i> Return Home
            </button>
        </div>
    </div>
</div>

<script>
    // Scoped script to handle the profile routing
    (function() {
        window.openStreamerProfile = function() {
            const input = document.getElementById('streamer-search-input');
            if (!input) return;
            
            const username = input.value.trim();
            
            if (username) {
                // Strip out any accidental @ symbols from the input
                const cleanUsername = username.replace('@', '');
                
                // Open the Tink profile in a new tab
                window.open(`https://play.tinko.online/profile?v=${encodeURIComponent(cleanUsername)}`, '_blank');
                
                // Optional: clear the input after search
                // input.value = '';
            } else {
                // Shake animation or focus if empty
                input.focus();
                input.parentElement.classList.add('animate-pulse', 'border-red-500/50');
                setTimeout(() => {
                    input.parentElement.classList.remove('animate-pulse', 'border-red-500/50');
                }, 500);
            }
        };
    })();
</script>
